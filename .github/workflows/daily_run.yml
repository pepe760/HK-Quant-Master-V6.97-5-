name: Daily HK Quant Run

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 消除 Node.js 20 升級警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 賦予機器人寫入檔案的權限 (解決 Error 128)
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install yfinance pandas numpy tqdm

      - name: Run script
        run: python main.py

      - name: Commit and Push
        run: |
          cp $(ls -t HK_*.html | head -1) index.html
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.html
          git commit -m "Auto-generate daily dashboard" || echo "No changes to commit"
          git push
