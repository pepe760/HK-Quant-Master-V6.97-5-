name: Daily HK Quant Run

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 取得程式碼 (Checkout repo)
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝所需套件 (Install dependencies)
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy tqdm

    - name: 執行量化程式 (Run script)
      run: python main.py

    - name: 儲存並推送生成的 HTML 檔案 (Commit and Push)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add *.html
        git commit -m "🤖 自動生成每日 Quant Dashboard" || echo "No changes to commit"
        git push
