name: Daily HK Stock Scanner

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # 👈 這裡升級到 v4，解決 Node.js 警告

      - name: Set up Python
        uses: actions/setup-python@v5 # 👈 這裡升級到 v5，解決 Node.js 警告
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Quant Scanner
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "Automated daily update of dashboard" || echo "No changes to commit"
          git push origin main
